name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.x"

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # This job runs the FULL suite once against a representative major. The
        # Postgres 11-17 version matrix for the corpus (including the version-
        # conditional finding rules) lives in corpus.yml (P2-T13), which runs the
        # corpus against every supported major.
        pg: ["16"]
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        env:
          ROWSHAPE_PG_VERSION: ${{ matrix.pg }}
          # Real seeded Postgres for the pull/profile catalog tests (P1-T3+),
          # the Docker-free equivalent of the RFC §13 testcontainers target.
          ROWSHAPE_TEST_PG_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
        run: go test ./...

  canonical-cross-platform:
    # RFC §11 / §13: the canonical form, digest, and hydrate output MUST be
    # byte-identical across platforms. The fixture and hydrate packages' golden,
    # digest-stability, and determinism tests therefore run on linux, darwin, and
    # windows (P1-T2 / P1-T7 verification). These need no Postgres, so the job
    # stays cheap and independent of the phase-2 PG version matrix.
    name: canonical form + hydrate (cross-platform)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test canonical form, digest, and hydrate determinism
        run: go test ./internal/fixture/... ./internal/hydrate/...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # v8 of the action is required to run golangci-lint v2, which is what
        # .golangci.yml is written against (`version: "2"`). The v6 action only
        # drives golangci-lint v1 and cannot read that config at all.
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned, not `latest`. With `latest`, a new golangci-lint release adds
          # checks overnight and turns CI red on a commit that changed nothing —
          # which trains everyone to ignore the lint job. Bump this deliberately.
          version: v2.12.2
