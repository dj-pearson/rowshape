name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.x"

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matrix-ready for the Postgres 11-17 version matrix wired in phase 2
        # (P2-T13). Phase 0/1 have no PG-dependent tests yet, so a single entry
        # keeps CI green now; expand this list to [11, 12, 13, 14, 15, 16, 17]
        # when validate lands.
        pg: ["16"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        env:
          ROWSHAPE_PG_VERSION: ${{ matrix.pg }}
        run: go test ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
