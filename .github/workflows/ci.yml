name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.x"

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matrix-ready for the Postgres 11-17 version matrix wired in phase 2
        # (P2-T13). Phase 0/1 have no PG-dependent tests yet, so a single entry
        # keeps CI green now; expand this list to [11, 12, 13, 14, 15, 16, 17]
        # when validate lands.
        pg: ["16"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        env:
          ROWSHAPE_PG_VERSION: ${{ matrix.pg }}
        run: go test ./...

  canonical-cross-platform:
    # RFC §11 / §13: the canonical form and digest MUST be byte-identical across
    # platforms. The fixture package's golden + digest-stability tests therefore
    # run on linux, darwin, and windows (P1-T2 verification). This job is scoped
    # to ./internal/fixture/... — it needs no Postgres, so it stays cheap and
    # independent of the phase-2 PG version matrix.
    name: canonical form (cross-platform)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test canonical form + digest
        run: go test ./internal/fixture/...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
